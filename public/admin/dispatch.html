<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Dispatch Tool · Social Compass Media</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#091529;color:#F5F0E6;font-family:Inter,sans-serif;min-height:100vh;padding:40px 20px}
.container{max-width:800px;margin:0 auto}
h1{font-family:Georgia,serif;font-size:32px;margin-bottom:20px;color:#C8B688}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;padding-bottom:20px;border-bottom:1px solid rgba(200,182,136,0.3)}
.nav a{color:#C8B688;text-decoration:none;font-size:14px}
.nav a:hover{color:#F5F0E6}
.status{padding:20px;background:#152849;margin:20px 0;border-radius:4px;line-height:1.6}
.btn{padding:12px 24px;background:#C8B688;color:#091529;border:none;cursor:pointer;margin:10px;font-weight:bold;border-radius:4px;display:inline-block;text-decoration:none}
.btn:hover{background:#D7C78B}
.drop{border:2px dashed #C8B688;padding:40px;text-align:center;margin:20px 0;cursor:pointer;border-radius:6px;transition:all 0.3s}
.drop:hover{background:rgba(200,182,136,0.1);border-color:#D7C78B}
.drop input{display:none}
.drop-text{font-size:16px;margin-bottom:8px;color:#C8B688}
.drop-sub{font-size:14px;color:rgba(245,240,230,0.7)}
.results{background:#152849;padding:20px;margin:20px 0;border-radius:6px;border-left:4px solid #C8B688}
.results h3{color:#C8B688;margin-bottom:15px}
.results p{margin-bottom:10px;line-height:1.5}
.results strong{color:#F5F0E6}
.loading{text-align:center;color:#C8B688;font-style:italic}
.error{color:#E07A5F;background:rgba(224,122,95,0.1);padding:15px;border-radius:4px;margin:10px 0}
.success{color:#94B49F;background:rgba(148,180,159,0.1);padding:15px;border-radius:4px;margin:10px 0}
</style>
</head><body>

<div class="container">
  <div class="nav">
    <h1>Email Dispatch Tool</h1>
    <a href="/">← Back to Main Site</a>
  </div>
  
  <div class="status" id="status">
    <strong>✓ Dispatch Tool Active</strong><br>
    Upload a CSV or Excel file with email addresses to begin processing your email campaign.
  </div>
  
  <label class="drop" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" onchange="handleFile(event)">
    <div class="drop-text">📁 Click to Upload CSV or Excel File</div>
    <div class="drop-sub">CSV · XLSX · XLS files supported</div>
  </label>
  
  <div style="text-align:center">
    <button class="btn" onclick="testBackend()">Test Backend Connection</button>
    <button class="btn" onclick="showDemo()">View Demo Data</button>
  </div>
  
  <div id="results"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const ADMIN_KEY = '301212Emj!'; // Admin key for backend calls

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const results = document.getElementById('results');
  results.innerHTML = '<div class="loading">Processing ' + file.name + '...</div>';
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);
      
      if (rows.length === 0) {
        results.innerHTML = '<div class="error">No data found in file</div>';
        return;
      }
      
      // Find email and name columns
      const emailCol = Object.keys(rows[0]).find(k => /email/i.test(k));
      const nameCol = Object.keys(rows[0]).find(k => /name|first/i.test(k));
      const validEmails = rows.filter(r => r[emailCol] && r[emailCol].includes('@'));
      
      results.innerHTML = `
        <div class="results">
          <h3>📊 File Analysis Complete</h3>
          <p><strong>${rows.length}</strong> total rows loaded</p>
          <p><strong>${validEmails.length}</strong> rows with valid email addresses</p>
          <p><strong>Email Column:</strong> ${emailCol || 'Not detected'}</p>
          <p><strong>Name Column:</strong> ${nameCol || 'Not detected'}</p>
          <br>
          <p>✓ Data parsed successfully and ready for campaign setup</p>
        </div>
      `;
      
    } catch (err) {
      results.innerHTML = '<div class="error">Error parsing file: ' + err.message + '</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

async function testBackend() {
  const results = document.getElementById('results');
  results.innerHTML = '<div class="loading">Testing backend connection...</div>';
  
  try {
    const response = await fetch('/api/check-pin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pin: ADMIN_KEY})
    });
    
    if (response.ok) {
      const data = await response.json();
      if (data.valid) {
        results.innerHTML = `
          <div class="success">
            <h3>✅ Backend Connection Successful</h3>
            <p>✓ Admin authentication verified</p>
            <p>✓ Netlify functions operational</p>
            <p>✓ SendGrid email system ready</p>
            <p>✓ Ready for email campaign processing</p>
          </div>
        `;
      } else {
        results.innerHTML = '<div class="error">Authentication failed</div>';
      }
    } else {
      results.innerHTML = '<div class="error">Backend connection failed</div>';
    }
  } catch (e) {
    results.innerHTML = '<div class="error">Connection test failed: ' + e.message + '</div>';
  }
}

function showDemo() {
  const results = document.getElementById('results');
  results.innerHTML = `
    <div class="results">
      <h3>📋 Demo Email Campaign Data</h3>
      <p><strong>Sample CSV Structure:</strong></p>
      <div style="background:#0D1F3C;padding:15px;border-radius:4px;font-family:monospace;margin:10px 0">
        firstName,lastName,email,company,title<br>
        John,Smith,john@example.com,Tech Corp,CEO<br>
        Sarah,Johnson,sarah@startup.io,StartupCo,Founder<br>
        Mike,Brown,mike@agency.com,Design Agency,Creative Director
      </div>
      <p><strong>Features Available:</strong></p>
      <p>• CSV/Excel file processing</p>
      <p>• Email address validation</p>
      <p>• AI-powered personalization (with Claude)</p>
      <p>• SendGrid delivery system</p>
      <p>• Template variable replacement</p>
      <p>• Batch sending with human pacing</p>
    </div>
  `;
}
</script>
</body></html>
